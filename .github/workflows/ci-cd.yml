name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

      - name: Find JAR
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*original*" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR found in target/" >&2
            exit 1
          fi
          echo "jar=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ steps.jar.outputs.jar }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Find JAR
        id: jar
        run: |
          JAR_PATH=$(find . -maxdepth 1 -type f -name "*.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR found after download" >&2
            exit 1
          fi
          cp "$JAR_PATH" app.jar
          echo "jar=app.jar" >> "$GITHUB_OUTPUT"

      - name: Ensure deploy path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ${{ steps.jar.outputs.jar }}
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            APP_JAR="$DEPLOY_PATH/app.jar"

            if [ -n "${{ secrets.SERVICE_NAME }}" ]; then
              sudo systemctl restart "${{ secrets.SERVICE_NAME }}"
              sudo systemctl status "${{ secrets.SERVICE_NAME }}" --no-pager
              exit 0
            fi

            if [ -z "${{ secrets.START_CMD }}" ]; then
              echo "SERVICE_NAME or START_CMD must be set" >&2
              exit 1
            fi

            pkill -f "$APP_JAR" || true
            cd "$DEPLOY_PATH"
            nohup bash -lc "${{ secrets.START_CMD }}" > app.log 2>&1 &
