name: CI-CD

env:
  IMAGE_NAME: ghcr.io/acse-bz421/lumu99-server
  IMAGE_TAG: sha-${{ github.sha }}

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lumu99_forum_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Wait for MySQL
        run: |
          PORT="${{ job.services.mysql.ports[3306] }}"
          for i in {1..30}; do
            if nc -z 127.0.0.1 "$PORT"; then
              echo "MySQL is up on port $PORT"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Test
        run: mvn -B test
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:${{ job.services.mysql.ports[3306] }}/lumu99_forum_test?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          TEST_DB_USERNAME: root
          TEST_DB_PASSWORD: root
          SPRING_FLYWAY_ENABLED: "true"

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
    steps:
      - name: Validate deploy secrets
        run: |
          set -e

          if [ -z "${{ env.SSH_HOST }}" ]; then
            echo "SSH_HOST is required (set in workflow env or GitHub secrets)" >&2
            exit 1
          fi

          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "SSH_USER is required" >&2
            exit 1
          fi

          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "SSH_PASSWORD is required for password login" >&2
            exit 1
          fi

          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "GHCR_PAT is required" >&2
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_CONTAINER_NAME }}" ]; then
            echo "DOCKER_CONTAINER_NAME is required" >&2
            exit 1
          fi

          if [ -z "${{ secrets.DOCKER_RUN_ARGS }}" ]; then
            echo "DOCKER_RUN_ARGS is required (e.g. -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod)" >&2
            exit 1
          fi

      - name: Deploy image on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -e

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            IMAGE="${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            CONTAINER="${{ secrets.DOCKER_CONTAINER_NAME }}"

            docker pull "$IMAGE"

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            docker run -d --name "$CONTAINER" --restart unless-stopped ${{ secrets.DOCKER_RUN_ARGS }} "$IMAGE"

            EXPECTED_IMAGE_ID=$(docker images --no-trunc --quiet "$IMAGE")
            RUNNING_IMAGE_ID=$(docker inspect -f '{{.Image}}' "$CONTAINER")

            if [ "$EXPECTED_IMAGE_ID" != "$RUNNING_IMAGE_ID" ]; then
              echo "Deployed container image does not match pulled image" >&2
              exit 1
            fi

            if [ -n "${{ secrets.HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.HEALTHCHECK_URL }}" > /dev/null
            fi

            docker ps --filter "name=$CONTAINER" --filter "status=running" --format '{{.Names}}' | grep -q "$CONTAINER"
